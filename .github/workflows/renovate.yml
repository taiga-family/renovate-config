name: 🤖 Run renovate
on:
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Override default log level'
        required: false
        type: choice
        options:
          - debug
          - info
  schedule:
    - cron: '0 */1 * * *'

jobs:
  renovate:
    runs-on: ubuntu-latest
    env:
      RENOVATE_CONFIG_FILE: default.json
      LOG_LEVEL: ${{ inputs.logLevel || 'debug' }}
      RENOVATE_TOKEN: ${{ secrets.TAIGA_FAMILY_BOT_PAT }}
      RENOVATE_ALLOWED_COMMANDS: '.*'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: taiga-family/ci/actions/setup/variables@6e89be341f2bb8247f26ac563e72344e6c9cf9ad # v1.220.0
      - uses: taiga-family/ci/actions/setup/node@6e89be341f2bb8247f26ac563e72344e6c9cf9ad # v1.220.0
      - run: |
          npx renovate \
                --autodiscover=true \
                --autodiscover-filter='taiga-family/*' \
                --allowed-post-upgrade-commands='.*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
