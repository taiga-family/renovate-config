name: ⚠️ Release
on:
  workflow_dispatch:
    inputs:
      mode:
        type: choice
        description: Bump version as requested
        required: true
        options:
          - minor
          - patch
          - major
  schedule:
    - cron: '0 7 * * 1'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: taiga-family/ci/actions/run/release-it@e768d782c3d60b207662078743ee0f8d6d2c765f # v1.207.0
        with:
          ref: ${{ github.ref }}
          mode: ${{ github.event.inputs.mode }}
          githubToken: ${{ secrets.TAIGA_FAMILY_BOT_PAT }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
